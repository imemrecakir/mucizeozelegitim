<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Sayfa bulunamadı — Mucize</title>
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: Inter, sans-serif;
        color: #1f2937;
        background: #fbf9f6;
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        margin: 0;
        padding: 1.5rem;
      }
      h1 {
        font-family: Poppins, sans-serif;
        font-size: 4.5rem;
        color: #0d9488;
        margin: 0;
      }
      .btn-brand {
        background: #0d9488;
        color: #fff;
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1.8rem;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
      }
      .btn-brand:hover {
        background: #0f766e;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>404</h1>
      <h2 class="fw-bold mt-2">Aradığınız sayfa bulunamadı</h2>
      <p
        class="text-secondary"
        style="max-width: 28rem; margin: 0.5rem auto 1.75rem"
      >
        Sayfa taşınmış veya kaldırılmış olabilir. Anasayfaya dönüp tekrar
        deneyebilirsiniz.
      </p>
      <a href="/" class="btn-brand">Anasayfaya dön</a>
    </div>
  </body>
</html>
